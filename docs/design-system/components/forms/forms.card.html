<!-- @dsCard group="Components" viewport="700x340" name="Forms — Field, Switch, FilterPills" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; padding: 28px; background: var(--al-background); font-family: var(--al-font); }
  .group { margin-bottom: 24px; }
  .label { font-size: 10px; font-weight: 800; letter-spacing: .2em; text-transform: uppercase; color: #43474f; opacity: .55; margin-bottom: 12px; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; max-width: 520px; }
  .row { display: flex; gap: 18px; align-items: center; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { Field, Switch, FilterPills } = window.AstroDesignSystem_424d7f;
    function Demo() {
      const [open, setOpen] = React.useState(true);
      const [closed, setClosed] = React.useState(false);
      const [filter, setFilter] = React.useState("settled");
      return (
        <>
          <div className="group">
            <div className="label">Field</div>
            <div className="grid">
              <Field label="Shop name" placeholder="Atelier No. 9" required />
              <Field label="Buffer" icon="schedule" value="15 min" help="Held after each booking" readOnly />
            </div>
          </div>
          <div className="group">
            <div className="label">Switch</div>
            <div className="row">
              <Switch checked={open} onChange={setOpen} /> <span style={{fontSize:13,fontWeight:600,color:'#43474f'}}>Monday open</span>
              <Switch checked={closed} onChange={setClosed} /> <span style={{fontSize:13,fontWeight:600,color:'#43474f'}}>Sunday open</span>
            </div>
          </div>
          <div className="group" style={{marginBottom:0}}>
            <div className="label">FilterPills</div>
            <FilterPills
              value={filter}
              onChange={setFilter}
              options={[{key:"all",label:"All"},{key:"settled",label:"Settled"},{key:"voided",label:"Voided"},{key:"unresolved",label:"Unresolved"},{key:"risk",label:"Risk only"}]}
              counts={{ settled: 3, voided: 1, unresolved: 2, risk: 1 }}
            />
          </div>
        </>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
  </script>
</body>
</html>
