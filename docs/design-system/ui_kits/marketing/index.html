<!-- @dsCard group="Marketing" viewport="1280x860" name="Astro Marketing Site" subtitle="Full landing page in Atelier Light: hero, how-it-works, features, pricing, FAQ, CTA" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Astro — Stop losing money to no-shows</title>
<link rel="stylesheet" href="../../styles.css">
<style>
  html, body { margin: 0; }
  body { background: var(--al-background); font-family: var(--al-font); }
  a { color: inherit; }

  /* ── Component/container-based responsiveness ──────────────────
     The page adapts to the width of #root (its own container),
     NOT the device viewport. Embed the kit at any width and the
     layout reflows on container size via @container + cqi units. */
  #root { container-type: inline-size; container-name: page; }

  /* Tablet / medium container */
  @container page (max-width: 900px) {
    .m-hero-grid { grid-template-columns: 1fr !important; gap: 40px !important; }
    .m-feat-grid { grid-template-columns: 1fr !important; gap: 40px !important; }
    .m-feat-grid > * { order: 0 !important; }
    .m-feat-art   { order: 2 !important; }
    .m-feat-text  { order: 1 !important; }
    .m-3col { grid-template-columns: 1fr 1fr !important; }
    .m-pad-x { padding-left: 28px !important; padding-right: 28px !important; }
    .m-float { display: none !important; }
  }

  /* Phone / narrow container */
  @container page (max-width: 600px) {
    .m-nav-links { display: none !important; }
    .m-nav-signin { display: none !important; }
    .m-3col { grid-template-columns: 1fr !important; }
    .m-hero-pills { flex-wrap: wrap !important; }
    .m-cta-actions { flex-direction: column !important; }
    .m-section { padding-top: 64px !important; padding-bottom: 64px !important; }
  }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel" src="MarketingNav.jsx"></script>
<script type="text/babel" src="MarketingHero.jsx"></script>
<script type="text/babel" src="HowItWorks.jsx"></script>
<script type="text/babel" src="FeatureRows.jsx"></script>
<script type="text/babel" src="Pricing.jsx"></script>
<script type="text/babel" src="MarketingClose.jsx"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">
  function Site() {
    return (
      <>
        <window.MarketingNav />
        <main>
          <window.MarketingHero />
          <window.HowItWorks />
          <window.FeatureRows />
          <window.Pricing />
          <window.Faq />
          <window.MarketingClose />
        </main>
      </>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Site />);
</script>
</body>
</html>
