<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Book with kicksnare — Astro</title>
<link rel="stylesheet" href="../../styles.css">
<style>
  html, body { margin: 0; }
  body { background: var(--al-surface-container-low); font-family: var(--al-font); }
  a { color: inherit; }
  #root { container-type: inline-size; container-name: page; }
  @container page (max-width: 600px) {
    .m-nav-links { display: none !important; }
    .m-nav-signin { display: none !important; }
  }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel" src="MarketingNav.jsx"></script>
<script type="text/babel" src="Booking.jsx"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">
  const DS = window.AstroDesignSystem_424d7f;
  function Page() {
    return (
      <>
        <window.MarketingNav />
        <main>
          <window.Booking />
        </main>
        <footer style={{ background: "var(--al-background)", borderTop: "1px solid var(--al-hairline)", padding: "40px 32px" }}>
          <div style={{ maxWidth: 1100, margin: "0 auto", display: "flex", flexDirection: "column", alignItems: "center", gap: 18 }}>
            <div style={{ display: "flex", alignItems: "center", gap: 11 }}>
              <span style={{ width: 30, height: 30, borderRadius: 9, background: "var(--al-gradient-cta)", color: "#fff", display: "grid", placeItems: "center" }}>
                <DS.Icon name="dashboard_customize" size={18} fill color="#fff" />
              </span>
              <span style={{ fontSize: 17, fontWeight: 800, letterSpacing: ".16em", textTransform: "uppercase", color: "var(--al-primary)" }}>Astro</span>
            </div>
            <p style={{ margin: 0, fontSize: 13, color: "var(--al-on-surface-variant)", opacity: .7 }}>Powered by Astro · Protected booking</p>
          </div>
        </footer>
      </>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Page />);
</script>
</body>
</html>
