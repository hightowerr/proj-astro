<!-- @dsCard group="Colors" viewport="700x160" name="Terracotta Accent" subtitle="Rationed warm accent — avatars and at most one badge per view" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 20px; background: var(--al-background); display: flex; gap: 14px; align-items: center; }
  .sw { flex: 1; border-radius: 12px; padding: 14px; height: 96px; display: flex; flex-direction: column; justify-content: space-between; }
  .name { font-size: 12px; font-weight: 800; }
  .hex { font-family: var(--al-font-mono); font-size: 11px; opacity: .75; }
  .av { width: 56px; height: 56px; border-radius: 9999px; display: grid; place-items: center; font-weight: 800; font-size: 18px; }
</style>
</head>
<body>
  <div class="sw" style="background:#fdd8cb;color:#572411"><span class="name">secondary-container</span><span class="hex">#fdd8cb</span></div>
  <div class="sw" style="background:#ffdbcf;color:#2a170f"><span class="name">secondary-fixed · curator</span><span class="hex">#ffdbcf</span></div>
  <div class="sw" style="background:#e2bfb3;color:#3b1002"><span class="name">secondary-fixed-dim</span><span class="hex">#e2bfb3</span></div>
  <div style="display:flex;flex-direction:column;align-items:center;gap:8px">
    <div class="av" style="background:linear-gradient(135deg,#fdd8cb,#e2bfb3);color:#572411">TR</div>
    <span class="hex" style="color:#43474f">risk avatar</span>
  </div>
</body>
</html>
