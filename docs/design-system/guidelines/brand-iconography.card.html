<!-- @dsCard group="Brand" viewport="700x160" name="Iconography" subtitle="Material Symbols Outlined only · FILL 0 rest → FILL 1 active" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 26px; background: var(--al-background); font-family: var(--al-font); }
  .row { display: flex; gap: 26px; align-items: center; color: var(--al-primary); }
  .ico { font-size: 30px; }
  .lab { font-family: var(--al-font-mono); font-size: 10px; color: #43474f; margin-top: 16px; }
  .pair { display: flex; gap: 8px; align-items: center; }
</style>
</head>
<body>
  <div class="row">
    <span class="material-symbols-outlined ico">calendar_month</span>
    <span class="material-symbols-outlined ico">group</span>
    <span class="material-symbols-outlined ico">notifications</span>
    <span class="material-symbols-outlined ico">receipt_long</span>
    <span class="material-symbols-outlined ico">warning</span>
    <span class="material-symbols-outlined ico">schedule</span>
    <span class="pair"><span class="material-symbols-outlined ico">home</span><span style="opacity:.4">/</span><span class="material-symbols-outlined ico" data-fill="1">home</span></span>
  </div>
  <div class="lab">outline (rest) · · · filled (active) — fill 0 → 1 signals active state</div>
</body>
</html>
