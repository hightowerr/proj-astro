<!-- @dsCard group="Type" viewport="700x160" name="Numeric Motif" subtitle="JetBrains Mono + tabular-nums for every data figure" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 24px; background: var(--al-background); font-family: var(--al-font); display: flex; gap: 36px; align-items: center; }
  .fig { font-family: var(--al-font-mono); font-variant-numeric: tabular-nums; color: #001e40; font-weight: 700; }
  .item { display: flex; flex-direction: column; gap: 4px; }
  .lab { font-size: 10px; font-weight: 800; letter-spacing: .2em; text-transform: uppercase; color: #43474f; opacity: .55; }
</style>
</head>
<body>
  <div class="item"><span class="lab">Revenue</span><span class="fig" style="font-size:36px">£462</span></div>
  <div class="item"><span class="lab">Booked</span><span class="fig" style="font-size:36px">6/8</span></div>
  <div class="item"><span class="lab">Time</span><span class="fig" style="font-size:24px">09:00</span></div>
  <div class="item"><span class="lab">Capacity</span><span class="fig" style="font-size:24px">3/3</span></div>
</body>
</html>
