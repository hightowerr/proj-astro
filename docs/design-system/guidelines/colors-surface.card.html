<!-- @dsCard group="Colors" viewport="700x150" name="Surface Stack" subtitle="Tonal layering — boundaries by background shift, not lines" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 20px; background: var(--al-background); }
  .row { display: flex; gap: 10px; }
  .sw { flex: 1; border-radius: 10px; padding: 12px; height: 92px; display: flex; flex-direction: column; justify-content: space-between; border: 1px solid var(--al-hairline); }
  .name { font-size: 11px; font-weight: 800; color: #1a1c1b; }
  .hex { font-family: var(--al-font-mono); font-size: 10px; color: #43474f; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw" style="background:#f9f9f7"><span class="name">surface / canvas</span><span class="hex">#f9f9f7</span></div>
    <div class="sw" style="background:#ffffff"><span class="name">container-lowest</span><span class="hex">#ffffff</span></div>
    <div class="sw" style="background:#f4f4f2"><span class="name">container-low</span><span class="hex">#f4f4f2</span></div>
    <div class="sw" style="background:#eeeeec"><span class="name">container</span><span class="hex">#eeeeec</span></div>
    <div class="sw" style="background:#e8e8e6"><span class="name">container-high</span><span class="hex">#e8e8e6</span></div>
    <div class="sw" style="background:#e2e3e1"><span class="name">container-highest</span><span class="hex">#e2e3e1</span></div>
  </div>
</body>
</html>
