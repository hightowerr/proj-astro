<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 22px; background: var(--al-background); font-family: var(--al-font); display: flex; gap: 16px; }
  .item { flex: 1; display: flex; flex-direction: column; gap: 8px; }
  .box { height: 80px; border-radius: 14px; }
  .lab { font-family: var(--al-font-mono); font-size: 10px; color: #43474f; }
</style>
</head>
<body>
  <div class="item"><div class="box" style="background:var(--al-gradient-cta)"></div><span class="lab">CTA · navy→navy</span></div>
  <div class="item"><div class="box" style="background:var(--al-gradient-avatar-top)"></div><span class="lab">avatar · top tier</span></div>
  <div class="item"><div class="box" style="background:var(--al-gradient-avatar-std)"></div><span class="lab">avatar · risk tier</span></div>
  <div class="item"><div class="box al-hatch-fill" style="background-color:#f4f4f2"></div><span class="lab">hatch · closed day</span></div>
</body>
</html>
