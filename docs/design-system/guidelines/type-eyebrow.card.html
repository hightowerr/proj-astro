<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 28px; background: var(--al-background); font-family: var(--al-font); display: flex; flex-direction: column; gap: 18px; }
  .eyebrow { font-size: 11px; font-weight: 800; letter-spacing: .2em; text-transform: uppercase; color: #43474f; opacity: .55; }
  .col { display: flex; gap: 40px; }
  .meta { font-family: var(--al-font-mono); font-size: 10px; color: #43474f; opacity: .7; }
</style>
</head>
<body>
  <div class="col">
    <span class="eyebrow">The ledger</span>
    <span class="eyebrow">Studio management</span>
    <span class="eyebrow">For salons & barbers</span>
  </div>
  <div class="meta">letter-spacing .2em · text-transform uppercase · weight 800 · opacity .55</div>
</body>
</html>
