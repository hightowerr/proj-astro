<!-- @dsCard group="Colors" viewport="700x150" name="Primary & Ink" subtitle="Navy is the only ink and the only CTA color" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 20px; background: var(--al-background); }
  .row { display: flex; gap: 14px; }
  .sw { flex: 1; border-radius: 12px; padding: 14px; height: 96px; display: flex; flex-direction: column; justify-content: space-between; box-shadow: var(--al-shadow-float); }
  .name { font-size: 12px; font-weight: 800; }
  .hex { font-family: var(--al-font-mono); font-size: 11px; opacity: .7; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw" style="background:#001e40;color:#fff"><span class="name">Primary</span><span class="hex">#001e40</span></div>
    <div class="sw" style="background:#003366;color:#fff"><span class="name">Primary container</span><span class="hex">#003366</span></div>
    <div class="sw" style="background:#fff;color:#1a1c1b"><span class="name">On-surface · body ink</span><span class="hex">#1a1c1b</span></div>
    <div class="sw" style="background:#fff;color:#43474f"><span class="name">On-surface-variant · muted</span><span class="hex">#43474f</span></div>
  </div>
</body>
</html>
