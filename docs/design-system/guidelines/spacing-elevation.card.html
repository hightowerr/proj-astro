<!-- @dsCard group="Spacing" viewport="700x170" name="Elevation" subtitle="One soft float for cards; color shadows lift CTAs & menus" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 28px; background: var(--al-background); font-family: var(--al-font); display: flex; gap: 28px; align-items: center; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 12px; }
  .box { width: 130px; height: 80px; border-radius: 16px; background: #fff; }
  .lab { font-family: var(--al-font-mono); font-size: 10px; color: #43474f; text-align: center; }
</style>
</head>
<body>
  <div class="item"><div class="box" style="box-shadow:var(--al-shadow-float)"></div><span class="lab">card float<br>0 20 40 / .04</span></div>
  <div class="item"><div class="box" style="box-shadow:var(--al-shadow-menu)"></div><span class="lab">menu<br>0 20 40 / .10</span></div>
  <div class="item"><div class="box" style="background:var(--al-gradient-cta);box-shadow:var(--al-shadow-cta)"></div><span class="lab">CTA navy<br>0 14 28 / .20</span></div>
</body>
</html>
