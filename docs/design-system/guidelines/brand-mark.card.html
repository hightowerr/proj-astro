<!-- @dsCard group="Brand" viewport="700x160" name="Brand Mark" subtitle="Material Symbol tile + uppercase wordmark, .2em tracking" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 28px; background: var(--al-background); font-family: var(--al-font); display: flex; flex-direction: column; gap: 22px; }
  .brand { display: flex; align-items: center; gap: 14px; color: var(--al-primary); }
  .tile { width: 44px; height: 44px; border-radius: 12px; background: var(--al-gradient-cta); color: #fff; display: grid; place-items: center; box-shadow: var(--al-shadow-mark); }
  .word { font-size: 24px; font-weight: 800; letter-spacing: .16em; text-transform: uppercase; }
  .sub { font-size: 10px; font-weight: 500; letter-spacing: .2em; text-transform: uppercase; color: #43474f; opacity: .7; }
</style>
</head>
<body>
  <div class="brand">
    <span class="tile"><span class="material-symbols-outlined" style="font-size:26px" data-fill="1">dashboard_customize</span></span>
    <div>
      <div class="word">Astro</div>
      <div class="sub">Studio Management</div>
    </div>
  </div>
  <div class="brand">
    <span class="word" style="letter-spacing:.16em">ATELIER NO. 9</span>
  </div>
</body>
</html>
